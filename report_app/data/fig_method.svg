<text x="350.90909090909093" y="272" text-anchor="middle" font-size="10.5" fill="#555">scrutins passés (2002–2022) · chacun retiré à tour de rôle pour choisir le modèle</text>
<line x1="670.909090909091" y1="206" x2="670.909090909091" y2="256" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3"/>
<circle cx="700.0" cy="232" r="9" fill="#6A4C93" stroke="#FAFAF7" stroke-width="2"/>
<text x="700.0" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#1A1A2E">2024</text>
<text x="745" y="272" text-anchor="end" font-size="10.5" fill="#555">tenu à l'écart · testé une fois</text>
<text x="20" y="312" font-size="13" fill="#1A1A2E">Bon bloc en tête appelé dans <tspan font-weight="700">81,6 %</tspan> des bureaux</text>
<text x="20" y="338" font-size="11">R² par bloc, test 2024 hors échantillon :  <tspan fill="#E4572E">Gauche 0,74</tspan>   ·   <tspan fill="#4A90D9">Centre+Droite 0,61</tspan>   ·   <tspan fill="#6A4C93">Extrême Droite 0,80</tspan>   ·   <tspan fill="#9AA0A6">Abstention 0,74</tspan></text>
