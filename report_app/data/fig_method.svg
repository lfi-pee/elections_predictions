<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, 'Helvetica Neue', Arial, sans-serif"><defs><filter id="sh" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1A2E" flood-opacity="0.10"/></filter></defs><rect width="800" height="600" fill="#FAFAF7"/><text x="16" y="30" font-size="17" font-weight="800" fill="#1A1A2E">Comment ça marche</text><text x="784" y="30" text-anchor="end" font-size="11" fill="#6B6B76">prévoir chaque bureau · en déduire le gisement de gauche · le prouver sur le passé</text><line x1="16" y1="40" x2="784" y2="40" stroke="#E7E4DC" stroke-width="1"/><circle cx="27" cy="66" r="11" fill="#cc2229"/><text x="27" y="70.2" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">1</text><text x="46" y="70" font-size="13" font-weight="700" fill="#1A1A2E">Le modèle, lu bureau par bureau</text><rect x="16" y="84" width="180" height="104" rx="12" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1" filter="url(#sh)"/><rect x="212" y="84" width="180" height="104" rx="12" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1" filter="url(#sh)"/><rect x="408" y="84" width="180" height="104" rx="12" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1" filter="url(#sh)"/><rect x="604" y="84" width="180" height="104" rx="12" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1" filter="url(#sh)"/><rect x="36.0" y="108" width="42.0" height="11" rx="2" fill="#E4572E"/><rect x="78.0" y="108" width="47.6" height="11" rx="2" fill="#4A90D9"/><rect x="125.6" y="108" width="50.4" height="11" rx="2" fill="#6A4C93"/><line x1="232" y1="114" x2="372" y2="114" stroke="#CBC9C2" stroke-width="2"/><line x1="248" y1="114" x2="248" y2="103" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round"/><line x1="276" y1="114" x2="276" y2="122" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round"/><line x1="304" y1="114" x2="304" y2="108" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round"/><line x1="332" y1="114" x2="332" y2="126" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round"/><line x1="360" y1="114" x2="360" y2="105" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round"/><rect x="428.0" y="107" width="64.4" height="13" rx="2" fill="#E4572E"/><rect x="492.4" y="107" width="42.0" height="13" rx="2" fill="#4A90D9"/><rect x="534.4" y="107" width="33.6" height="13" rx="2" fill="#6A4C93"/><line x1="628" y1="114" x2="760" y2="114" stroke="#1A1A2E" stroke-width="1.6"/><line x1="628" y1="108" x2="628" y2="120" stroke="#1A1A2E" stroke-width="1.6"/><line x1="760" y1="108" x2="760" y2="120" stroke="#1A1A2E" stroke-width="1.6"/><circle cx="694.0" cy="114" r="4.5" fill="#cc2229"/><text x="106.0" y="154" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">Le national</text><text x="106.0" y="172" text-anchor="middle" font-size="9" fill="#6B6B76">la moyenne des sondages</text><text x="302.0" y="154" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">+ lecture locale</text><text x="302.0" y="172" text-anchor="middle" font-size="9" fill="#6B6B76">votes passés · INSEE · géo</text><text x="498.0" y="154" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">= prévision du bureau</text><text x="498.0" y="172" text-anchor="middle" font-size="9" fill="#6B6B76">part des blocs + abstention</text><text x="694.0" y="154" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A1A2E">la fourchette</text><text x="694.0" y="172" text-anchor="middle" font-size="9" fill="#6B6B76">fiable à 80 / 90 / 95 %</text><path d="M200,128 L208,134 L200,140" fill="none" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/><path d="M396,128 L404,134 L396,140" fill="none" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/><path d="M592,128 L600,134 L592,140" fill="none" stroke="#cc2229" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/><text x="16" y="212" font-size="9.6" fill="#6B6B76">Régression Ridge par bloc : gauche et centre+droite apprises sur les législatives passées, extrême droite et abstention sur tous les scrutins.</text><text x="16" y="226" font-size="9.6" fill="#6B6B76">Elle pèse indicateurs INSEE, géographie et votes passés ; l'abstention, faute de sondage, est calée sur la participation passée.</text><circle cx="27" cy="250" r="11" fill="#cc2229"/><text x="27" y="254.2" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">2</text><text x="46" y="254" font-size="13" font-weight="700" fill="#1A1A2E">Le gisement — l'abstention de gauche, estimée et non supposée</text><rect x="16" y="268" width="224" height="106" rx="12" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1" filter="url(#sh)"/><text x="128.0" y="292" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">Abstentionnistes conjoncturels</text><rect x="34" y="310" width="188" height="12" rx="3" fill="#E4E5E7"/><rect x="34" y="310" width="18.3" height="12" rx="3" fill="#9AA0A6"/><text x="128.0" y="338" text-anchor="middle" font-size="8.4" fill="#6B6B76">abstention prévue − plancher historique du bureau</text><text x="128.0" y="358" text-anchor="middle" font-size="11" fill="#1A1A2E"><tspan font-weight="700">1,65 M</tspan><tspan fill="#6B6B76">&#160;sur&#160;16,9 M</tspan></text><text x="264" y="328" text-anchor="middle" font-size="26" fill="#6B6B76">×</text><text x="536" y="327" text-anchor="middle" font-size="26" fill="#6B6B76">=</text><rect x="288" y="268" width="224" height="106" rx="12" fill="#FFFFFF" stroke="#E7E4DC" stroke-width="1" filter="url(#sh)"/><text x="400.0" y="290" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1A1A2E">la part qui revient à gauche</text><text x="400.0" y="304" text-anchor="middle" font-size="8.4" fill="#6B6B76">100 votants de plus → combien rejoignent la gauche ?</text><line x1="310" y1="358" x2="490" y2="358" stroke="#E0DDD5" stroke-width="1"/><polyline points="315.5,340.6 341.8,334.8 359.2,330.9 375.9,327.0 393.2,323.1 413.2,320.7 439.5,321.0 486.1,316.6" fill="none" stroke="#E4572E" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/><polyline points="333.1,356.2 359.8,354.3 375.6,350.4 389.1,343.6 401.9,336.9 416.4,330.4 434.7,323.4 473.0,314.7" fill="none" stroke="#4A90D9" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/><polyline points="329.0,345.1 350.8,348.8 363.7,351.0 375.6,352.1 388.4,351.6 402.9,350.6 422.2,349.3 461.1,344.0" fill="none" stroke="#6A4C93" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/><rect x="560" y="268" width="224" height="106" rx="12" fill="#F5D5C9" stroke="#E4572E" stroke-width="1" filter="url(#sh)"/><text x="672.0" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#1A1A2E">Mobilisables de gauche</text><text x="672.0" y="334" text-anchor="middle" font-size="26" font-weight="800" fill="#E4572E">0,69 M</text><text x="672.0" y="356" text-anchor="middle" font-size="9.5" fill="#6B6B76">en métropole</text><text x="16" y="402" font-size="9.6" fill="#6B6B76">Cette part se mesure, jamais ne se suppose : sur les scrutins passés du même type, quand la participation d'un bureau monte, on lit le gain net de la gauche par point de participation.</text><text x="16" y="416" font-size="9.6" fill="#6B6B76">Gain net (entrées, sorties et reports confondus) — stable dans le temps (+0,96), mais propre au scrutin : <tspan font-weight="700" fill="#E4572E">législatives ~39</tspan> · <tspan font-weight="700" fill="#4A90D9">européennes ~24</tspan> · <tspan font-weight="700" fill="#6A4C93">présidentielle ~12</tspan> sur 100.</text><circle cx="27" cy="436" r="11" fill="#cc2229"/><text x="27" y="440.2" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">3</text><text x="46" y="440" font-size="13" font-weight="700" fill="#1A1A2E">La preuve — choisi sur le passé, testé une seule fois sur 2024</text><line x1="70.0" y1="494.0" x2="628.0" y2="494.0" stroke="#E0DDD5" stroke-width="1.4"/><circle cx="70.0" cy="494.0" r="5.5" fill="#1A1A2E" opacity="0.85"/><circle cx="195.0" cy="494.0" r="5.5" fill="#1A1A2E" opacity="0.85"/><circle cx="445.0" cy="494.0" r="5.5" fill="#1A1A2E" opacity="0.85"/><circle cx="570.0" cy="494.0" r="5.5" fill="#1A1A2E" opacity="0.85"/><circle cx="320.0" cy="494.0" r="5.5" fill="#FAFAF7" stroke="#6A4C93" stroke-width="2"/><text x="320.0" y="478.0" text-anchor="middle" font-size="9" fill="#6A4C93">retiré à tour de rôle</text><path d="M64.0 510.0 V516.0 H576.0 V510.0" fill="none" stroke="#BFBCB4" stroke-width="1"/><text x="320.0" y="532.0" text-anchor="middle" font-size="10" fill="#6B6B76">scrutins passés (2002–2022) · servent à choisir le modèle</text><line x1="595.0" y1="468.0" x2="595.0" y2="516.0" stroke="#D8D5CD" stroke-width="1" stroke-dasharray="3 3"/><circle cx="620.0" cy="494.0" r="15" fill="#cc2229" opacity="0.14"/><circle cx="620.0" cy="494.0" r="8" fill="#cc2229"/><text x="620.0" y="478.0" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E">2024</text><text x="620.0" y="532.0" text-anchor="middle" font-size="10" fill="#6B6B76">jamais vu · testé une fois</text><text x="16" y="560" font-size="13" fill="#1A1A2E">Bon bloc en tête désigné dans <tspan font-weight="800" fill="#cc2229">83,1 %</tspan> des bureaux.</text><text x="16" y="582" font-size="10.5" fill="#6B6B76">R² par bloc (test 2024, hors échantillon) :  <tspan fill="#E4572E">Gauche 0,77</tspan>   ·   <tspan fill="#4A90D9">Centre+Droite 0,73</tspan>   ·   <tspan fill="#6A4C93">Extrême Droite 0,82</tspan>   ·   <tspan fill="#9AA0A6">Abstention 0,56</tspan></text></svg>