<path d="M0,0 L7,3.5 L0,7 z" fill="#1A1A2E"/></marker></defs>
<rect width="760" height="360" fill="#FAFAF7"/>
<text x="20" y="34" font-size="17" font-weight="700" fill="#1A1A2E">Comment ça marche : national + lecture locale, choisi par validation croisée</text>
<rect x="20" y="64" width="150" height="74" rx="9" fill="#FAFAF7" stroke="#1A1A2E" stroke-width="1.4"/><text x="95" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A2E">National</text><text x="95" y="118" text-anchor="middle" font-size="10.5" fill="#555">sondages · participation</text><rect x="205" y="64" width="150" height="74" rx="9" fill="#FAFAF7" stroke="#1A1A2E" stroke-width="1.4"/><text x="280" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A2E">+ Écart local</text><text x="280" y="118" text-anchor="middle" font-size="10.5" fill="#555">démographie INSEE · vote passé</text><rect x="390" y="64" width="150" height="74" rx="9" fill="#FAFAF7" stroke="#1A1A2E" stroke-width="1.4"/><text x="465" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A2E">Prédiction</text><text x="465" y="118" text-anchor="middle" font-size="10.5" fill="#555">du bureau de vote</text><rect x="575" y="64" width="150" height="74" rx="9" fill="#FAFAF7" stroke="#1A1A2E" stroke-width="1.4"/><text x="650" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A2E">Intervalle</text><text x="650" y="118" text-anchor="middle" font-size="10.5" fill="#555">conforme 80/90/95</text><line x1="170" y1="101" x2="205" y2="101" stroke="#1A1A2E" stroke-width="1.4" marker-end="url(#a)"/><line x1="355" y1="101" x2="390" y2="101" stroke="#1A1A2E" stroke-width="1.4" marker-end="url(#a)"/><line x1="540" y1="101" x2="575" y2="101" stroke="#1A1A2E" stroke-width="1.4" marker-end="url(#a)"/>
<text x="20" y="184" font-size="13" font-weight="600" fill="#1A1A2E">Validation croisée par scrutin, puis un test unique</text>
