<circle cx="60.0" cy="232" r="6" fill="#1A1A2E" opacity="0.85"/><circle cx="205.45454545454547" cy="232" r="6" fill="#1A1A2E" opacity="0.85"/><circle cx="496.3636363636364" cy="232" r="6" fill="#1A1A2E" opacity="0.85"/><circle cx="641.8181818181819" cy="232" r="6" fill="#1A1A2E" opacity="0.85"/>
