name: Deploy site to GitHub Pages

# Publie le site statique `report_app/` sur GitHub Pages.
# Pages/Actions sont natifs GitHub : aucune app OAuth tierce, donc la politique
# OAuth de l'org (qui bloque Streamlit Cloud) ne s'applique pas ici.

on:
  push:
    branches: [master, site-novice-readable]
    paths: ["report_app/**", ".github/workflows/pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # Enable Pages + set the build type to "GitHub Actions" via the API,
        # so no manual Settings → Pages → Source toggle is needed.
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report_app
      - id: deployment
        uses: actions/deploy-pages@v4
